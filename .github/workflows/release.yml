name: release

# Build the gazette image and push it to GHCR on every merge to main (and on
# version tags). The gateway box pulls this image to deploy as a tinsnip quadlet
# (see the private tinsnip repo, hosts/gateway/gazette.container).
on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    name: build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to ghcr.io/<owner>/gazette
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        # cross-arch emulation so the amd64 runner can build the arm64 image
        # the Oracle box (Ampere/aarch64) needs.
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        # container driver: required for the gha build cache export below
        uses: docker/setup-buildx-action@v3

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dockerfile          # gazette's Dockerfile is lower-case
          # arm64 for the Oracle Ampere box; amd64 kept for dev/CI parity.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
